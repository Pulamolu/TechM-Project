<div class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Task Manager</p>
    <h1>Create your account</h1>
    <p class="subtitle">Set a password and you're in.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
        <small class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Enter a valid email address.
        </small>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="At least 6 characters" autocomplete="new-password" />
        <small class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Password must be at least 6 characters.
        </small>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Retype your password" autocomplete="new-password" />
        <small class="error" *ngIf="form.get('confirmPassword')?.touched && form.errors?.['passwordMismatch']">
          Passwords do not match.
        </small>
      </div>

      <small class="error server-error" *ngIf="errorMessage">{{ errorMessage }}</small>

      <button type="submit" class="primary-btn" [disabled]="loading">
        {{ loading ? 'Creating account…' : 'Register' }}
      </button>
    </form>

    <p class="switch-link">Already have an account? <a routerLink="/login">Log in</a></p>
  </div>
</div>
