<div class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Task Manager</p>
    <h1>Set a new password</h1>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="password">New password</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" autocomplete="new-password" />
        <small class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">Password must be at least 6 characters.</small>
      </div>

      <div class="field">
        <label for="confirm">Confirm password</label>
        <input id="confirm" type="password" formControlName="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <small class="info" *ngIf="message">{{ message }}</small>

      <button type="submit" class="primary-btn" [disabled]="loading">{{ loading ? 'Saving…' : 'Save password' }}</button>
    </form>

    <p class="switch-link"><button type="button" class="link-button" (click)="goToLogin()">Back to login</button></p>
  </div>
</div>
